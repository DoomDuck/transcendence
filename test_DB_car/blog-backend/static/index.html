<!DOCTYPE html>
<html lang='en'>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>Document</title>
	<script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
	<script src="/socket.io/socket.io.js"></script>
</head>
<body>
	<div id="v-app">
	<h1>Welcome<h1>
		<form>
			<input v-model ="text" type = "text"/>
			<button type='submit' @click.prevent="sendChatMessage()">Send</button>
		</form>
		<p>
			<ul>
				<li v-for="msg of messages ">
					<strong>{{msg.sender }}:</strong>{{msg.message}}
				</li>
			</ul>
		</p>
	</div>
	<script>
		var app = new Vue ({
					el: '#v-app',
					data: {
						username:'',
						text:'',
						messages: [],
						socket: {chat:null, alerts: null},
						alerts:[],
					},
				methods: {
					sendChatMessage(){
								this.socket.chat.emit('chatToServer',{sender: this.username, message: this.text});
								this.text="";
							},
					receiveChatMessage(msg){	
							this.messages.push(msg);
						}

					receiveAlertMessage(msg){	
							this.messages.push(msg);
						}
					},
					created(){
						this.username = prompt('Enter tour username:');
						this.socket.chat = io('http://localhost:5000/chat');
						this.socket.chat.on('chatToClient',(msg)=>{
							this.receiveChatMessage(msg);
						});
						this.socket.alerts = io('http://localhost:5000/alerts');
						this.socket.alerts.on('alertToClient',(msg)=>{
							this.receiveAlertMessage(msg);
						});
				}
			});
	</script>
</body>
</html>
